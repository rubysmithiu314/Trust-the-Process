<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust The Process | Vol. 1</title>
    <style>
        /* THE KILL BILL / BRUTALIST AESTHETIC */
        :root { 
            --bg: #F4DC26; /* Jumpsuit Yellow */
            --dark: #000000; /* Deep Black */
            --primary: #990000; /* Blood Red */
            --secondary: #FFFFFF; /* Stark White */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: var(--bg); color: var(--dark); padding: 10px; background-image: radial-gradient(#000 1px, transparent 1px); background-size: 20px 20px; }
        
        .container { max-width: 500px; margin: 0 auto; background: var(--secondary); border: 6px solid var(--dark); box-shadow: 12px 12px 0px var(--primary); overflow: hidden; }
        
        .header { background: var(--dark); color: var(--bg); padding: 15px; text-align: center; border-bottom: 6px solid var(--dark); font-weight: 900; text-transform: uppercase; font-size: 1.5rem; font-family: 'Impact', sans-serif; letter-spacing: 2px; }
        
        .status-bar { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; border-bottom: 4px solid var(--dark); text-transform: uppercase; }
        
        .tabs { display: flex; border-bottom: 6px solid var(--dark); background: #eee; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: 900; border-right: 4px solid var(--dark); text-transform: uppercase; }
        .tab:last-child { border-right: none; }
        .tab.active { background: var(--bg); border-bottom: none; color: var(--dark); }
        
        .content { padding: 15px; display: none; min-height: 400px; background: var(--secondary); }
        .content.active { display: block; }
        
        .card-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card { border: 4px solid var(--dark); padding: 10px; text-align: center; font-size: 0.75rem; font-weight: 900; min-height: 100px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; background: white; box-shadow: 5px 5px 0px var(--dark); transition: all 0.1s; text-transform: uppercase; }
        .card.selected { background: var(--dark) !important; color: var(--bg); transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--primary); border-color: var(--primary); }
        
        .card.program { background: #E0E0E0; }
        .card.action { background: #B0B0B0; }
        .card.funding-unres { background: var(--bg); color: var(--dark); border: 4px dashed var(--dark); }
        .card.crisis { background: var(--primary); color: white; border-color: var(--dark); }
        
        .btn { width: 100%; padding: 15px; margin-top: 15px; border: 4px solid var(--dark); font-weight: 900; cursor: pointer; box-shadow: 6px 6px 0px var(--dark); text-transform: uppercase; font-size: 1rem; font-family: 'Impact', sans-serif; letter-spacing: 1px; transition: all 0.1s; background: var(--secondary); }
        .btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px var(--primary); }
        .btn-main { background: var(--dark); color: var(--bg); }
        .btn-disabled { background: #555 !important; color: #222 !important; box-shadow: none !important; cursor: not-allowed; border-color: #222; }
        
        .info-box { border: 4px solid var(--dark); background: var(--bg); padding: 12px; margin-bottom: 15px; font-size: 0.85rem; font-weight: bold; line-height: 1.5; text-transform: uppercase; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--bg); padding: 25px; border: 8px solid var(--primary); width: 90%; max-width: 400px; box-shadow: 15px 15px 0px var(--dark); text-align: center; }
        #crisis-title { font-family: 'Impact', sans-serif; color: var(--primary); font-size: 2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    </script>
</head>
<body>

<div class="container" id="app"></div>

<div id="crisis-modal" class="modal">
    <div class="modal-content">
        <h2 id="crisis-title">SYSTEM CRISIS</h2>
        <p id="crisis-desc" style="margin: 15px 0; font-size: 0.9rem; font-weight: bold;"></p>
        <button class="btn" onclick="resolveCrisis('cash')">PAY 1 CIU (CASH)</button>
        <button class="btn" onclick="resolveCrisis('labor')">DISCARD 2 ACTION CARDS (LABOR)</button>
        <button class="btn" onclick="resolveCrisis('burnout')" style="background:var(--primary); color:white">SKIP TURN (BURNOUT)</button>
    </div>
</div>

<script>
    // GAME LOGIC CORE
    const gameState = {
        role: null,
        ciu: 4,
        lockedCIU: 0,
        hand: [],
        selectedIds: [],
        isTrustEstablished: false,
        turnTaken: false
    };

    function init() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="header">Trust The Process</div>
            <div style="padding: 20px;">
                <p style="margin-bottom: 20px; font-weight: bold; text-transform: uppercase;">Select your designation:</p>
                <button class="btn btn-main" onclick="setRole('Nonprofit')">Nonprofit Org</button>
                <button class="btn" style="background:var(--secondary); color:var(--dark)" onclick="setRole('Traditional Funder')">Foundation A (Traditional)</button>
                <button class="btn" style="background:var(--primary); color:white" onclick="setRole('Oak Foundation')">Foundation B (Oak)</button>
            </div>
        `;
    }

    function setRole(role) {
        gameState.role = role;
        if (role === 'Nonprofit') {
            gameState.hand = [
                { id: 'p1', type: 'program', name: 'HEALTH', desc: 'Core Program' },
                { id: 'a1', type: 'action', name: 'REPORT', desc: 'Admin' },
                { id: 'a2', type: 'action', name: 'BUDGET', desc: 'Admin' },
                { id: 'a3', type: 'action', name: 'AUDIT', desc: 'Admin' }
            ];
        }
        render();
    }

    function render() {
        const app = document.getElementById('app');
        const totalCIU = gameState.ciu + gameState.lockedCIU + (gameState.hand.filter(c => c.type === 'funding-unres').length * 3);
        
        app.innerHTML = `
            <div class="header">Trust The Process</div>
            <div class="status-bar">
                <span>LIQUID CIU: ${gameState.ciu}</span>
                <span>TOTAL IMPACT: ${totalCIU}</span>
            </div>
            <div class="tabs">
                <div class="tab active" id="t-hand" onclick="showTab('hand')">Dossier</div>
                <div class="tab" id="t-action" onclick="showTab('action')">Portal</div>
            </div>

            <div id="hand" class="content active">
                <div class="info-box">
                    <strong>STATUS:</strong><br>
                    ${gameState.isTrustEstablished ? 'TRUST VERIFIED WITH OAK FOUNDATION' : 'NO TRUST HISTORY ESTABLISHED'}
                </div>
                ${gameState.role === 'Nonprofit' ? `
                    <button class="btn ${gameState.turnTaken ? 'btn-disabled' : ''}" style="background:var(--bg)" onclick="gainCIU()">+1 LIQUID CIU</button>
                    <button class="btn btn-main ${!gameState.turnTaken ? 'btn-disabled' : ''}" onclick="draw()">DRAW CARD</button>
                ` : ''}
                <div class="card-grid">${renderHand()}</div>
            </div>

            <div id="action" class="content">
                ${renderRoleActionView()}
            </div>
        `;
    }

    function renderHand() {
        if (gameState.hand.length === 0) return `<p style="grid-column: span 3; text-align: center; padding: 20px; font-weight: bold;">YOUR HAND IS EMPTY.</p>`;
        
        return gameState.hand.map(c => `
            <div class="card ${c.type} ${gameState.selectedIds.includes(c.id) ? 'selected' : ''}" 
                 onclick="${c.type === 'funding-unres' ? `liquify('${c.id}')` : `toggleCard('${c.id}')`}">
                ${c.name}<br>
                <span style="font-weight:normal; font-size:0.6rem;">${c.desc}</span>
                ${c.type === 'funding-unres' ? '<br><br><strong>[LIQUIFY]</strong>' : ''}
            </div>
        `).join('');
    }

    function renderRoleActionView() {
        if (gameState.role === 'Nonprofit') {
            const reqActions = gameState.isTrustEstablished ? 1 : 3;
            const reqCost = gameState.isTrustEstablished ? 0 : 3;
            return `
                <h3 style="margin-bottom: 10px; font-family: 'Impact', sans-serif;">APPLICATION PORTAL</h3>
                <div class="info-box">
                    <strong>REQUIREMENTS:</strong><br>1 PROGRAM CARD<br>${reqActions} ACTION CARDS<br>${reqCost} CIU FEE<br>
                    <em>(Tap cards in your Dossier to attach them).</em>
                </div>
                <select id="funder-select" class="btn" style="background:white; box-shadow:none; margin-bottom: 10px;">
                    <option value="A">FOUNDATION A (TRADITIONAL)</option>
                    <option value="B">FOUNDATION B (OAK)</option>
                </select>
                <button class="btn btn-main" onclick="submitApp()">SUBMIT PAPERWORK</button>
            `;
        } else if (gameState.role === 'Traditional Funder') {
            return `
                <h3 style="margin-bottom: 10px; font-family: 'Impact', sans-serif;">BUREAUCRATIC REVIEW</h3>
                <div class="info-box">APPLY THE COIN FLIP RULE. NO HUMAN JUDGMENT.</div>
                <button class="btn" style="background:var(--bg); color:var(--dark)" onclick="flipCoin('heads')">APPROVE (HEADS)</button>
                <button class="btn" style="background:var(--dark); color:var(--bg)" onclick="flipCoin('tails')">DENY (TAILS)</button>
            `;
        } else {
            return `
                <h3 style="margin-bottom: 10px; font-family: 'Impact', sans-serif;">TRUST-BASED REVIEW</h3>
                <div class="info-box">REVIEW CANDIDATE. IF THEY MATCH, YOU MAY APPROVE.</div>
                <button class="btn btn-main" onclick="manualApprove()">APPROVE & BUILD TRUST</button>
                <button class="btn" style="background:var(--primary); color:white" onclick="alert('APPLICATION DENIED.')">DECLINE</button>
            `;
        }
    }

    // GAMEPLAY FUNCTIONS
    function gainCIU() { if (!gameState.turnTaken) { gameState.ciu++; gameState.turnTaken = true; render(); } }

    function draw() {
        if (!gameState.turnTaken) return;
        const pool = [
            { type: 'action', name: 'REPORT', desc: 'Admin' },
            { type: 'crisis', name: 'LEAKY ROOF', desc: 'Infrastructure' },
            { type: 'crisis', name: 'BURNOUT', desc: 'Operational' },
            { type: 'action', name: 'AUDIT', desc: 'Admin' }
        ];
        const c = pool[Math.floor(Math.random() * pool.length)];
        if (c.type === 'crisis') triggerCrisis(c.name);
        else gameState.hand.push({ ...c, id: Math.random().toString(36).substr(2, 5) });
        gameState.turnTaken = false;
        render();
    }

    function triggerCrisis(name) {
        document.getElementById('crisis-modal').style.display = 'flex';
        document.getElementById('crisis-desc').innerText = `CRISIS DETECTED: ${name}`;
    }

    function resolveCrisis(type) {
        if (type === 'cash') {
            if (gameState.ciu < 1) { alert("INSUFFICIENT CIU. CHOOSE ANOTHER OPTION."); return; }
            gameState.ciu--;
        }
        if (type === 'labor') {
            const actionCards = gameState.hand.filter(c => c.type === 'action');
            if (actionCards.length < 2) { alert("INSUFFICIENT ACTION CARDS. CHOOSE ANOTHER OPTION."); return; }
            let removed = 0;
            gameState.hand = gameState.hand.filter(c => {
                if (c.type === 'action' && removed < 2) { removed++; return false; }
                return true;
            });
            gameState.selectedIds = [];
        }
        if (type === 'burnout') alert("YOUR TEAM IS EXHAUSTED. SKIP YOUR NEXT TURN.");
        document.getElementById('crisis-modal').style.display = 'none';
        render();
    }

    function liquify(id) {
        gameState.hand = gameState.hand.filter(c => c.id !== id);
        gameState.ciu += 3;
        alert("FUNDS LIQUIFIED. +3 SPENDABLE CIU.");
        render();
    }

    function toggleCard(id) {
        if (gameState.selectedIds.includes(id)) gameState.selectedIds = gameState.selectedIds.filter(i => i !== id);
        else gameState.selectedIds.push(id);
        render();
    }

    function submitApp() {
        const funder = document.getElementById('funder-select').value;
        const programCount = gameState.hand.filter(c => gameState.selectedIds.includes(c.id) && c.type === 'program').length;
