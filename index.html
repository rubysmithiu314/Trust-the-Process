<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Philanthropy Game</title>
    <style>
        :root {
            --yellow: #FADC1B;
            --magenta: #E24A8D;
            --teal: #1AB5B3;
            --navy: #1C244C;
            --cream: #F5F1E6;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--cream);
            background-image: radial-gradient(var(--navy) 15%, transparent 16%),
                              radial-gradient(var(--navy) 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--navy);
            padding: 20px;
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; }

        /* Game Layout */
        #game-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard, .play-area {
            background: rgba(255, 255, 255, 0.9);
            border: 5px solid var(--navy);
            box-shadow: 10px 10px 0px var(--navy);
            padding: 20px;
        }

        /* Memphis Style Cards */
        .card {
            width: 140px;
            height: 200px;
            border: 4px solid var(--navy);
            box-shadow: 5px 5px 0px var(--navy);
            display: inline-block;
            margin: 10px;
            padding: 10px;
            vertical-align: top;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
            background: white;
        }
        .card:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px var(--navy); }
        .card.selected { border-color: var(--magenta); transform: translateY(-10px); }

        /* Card Varieties */
        .card-action { background-color: var(--teal); color: white; }
        .card-oaks { background-color: var(--yellow); }
        
        .card-trad { 
            background-color: #E5E5E5; 
            background-image: repeating-linear-gradient(0deg, transparent, transparent 19px, #CCC 20px),
                              repeating-linear-gradient(90deg, transparent, transparent 19px, #CCC 20px);
        }

        .card-crisis { background-color: var(--magenta); color: white; }
        
        .card-switch {
            background: linear-gradient(45deg, var(--yellow) 25%, var(--teal) 25%, var(--teal) 50%, var(--yellow) 50%, var(--yellow) 75%, var(--teal) 75%, var(--teal) 100%);
            background-size: 40px 40px;
            color: var(--navy);
            font-weight: bold;
        }

        .btn {
            background: var(--yellow);
            border: 3px solid var(--navy);
            box-shadow: 4px 4px 0px var(--navy);
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--navy); }
    </style>
</head>
<body>

    <center><h1>⚡ NONPROFIT SURVIVAL: MEMPHIS EDITION ⚡</h1></center>

    <div id="game-container">
        
        <div class="dashboard">
            <h2>Your Status</h2>
            <hr>
            <h3>💰 Tokens: <span id="token-count">3</span></h3>
            <p>Role: Grassroots Nonprofit</p>
            <hr>
            <h3>🏛️ Foundations</h3>
            <div id="oaks-status">Oaks Board: Loading...</div>
            <br>
            <div id="trad-status">Trad Board: Loading...</div>
        </div>

        <div class="play-area">
            <h2>Your Hand</h2>
            <button class="btn" onclick="drawCard()">Draw Card</button>
            <button class="btn" onclick="playSelected()">Play Selected Cards</button>
            <hr>
            <div id="hand"></div>
            <hr>
            <p id="game-message">Select cards to make a move. Remember: To apply for a grant, you need 1 matching Program card and 3 UNIQUE Action cards.</p>
        </div>
    </div>

<script>
// 1. GAME DATA & CARD DEFINITIONS
const DECK_TEMPLATE = [
    // Action Cards (Spam these so users can get 3 unique ones)
    { id: 'a1', name: 'Verbal Report', type: 'action', cls: 'card-action', icon: '🗣️' },
    { id: 'a2', name: 'Site Visit', type: 'action', cls: 'card-action', icon: '👟' },
    { id: 'a3', name: 'Policy Advocacy', type: 'action', cls: 'card-action', icon: '📢' },
    { id: 'a4', name: 'Mutual Aid', type: 'action', cls: 'card-action', icon: '🤝' },
    { id: 'a5', name: 'Storytelling', type: 'action', cls: 'card-action', icon: '📖' },
    { id: 'a6', name: 'Coalition Meet', type: 'action', cls: 'card-action', icon: '👥' },
    
    // Program Cards
    { id: 'po1', name: 'Health Equity', type: 'program', funder: 'oaks', cls: 'card-oaks', icon: '🏥' },
    { id: 'po2', name: 'Climate Justice', type: 'program', funder: 'oaks', cls: 'card-oaks', icon: '🌍' },
    { id: 'pt1', name: 'Backpack Drive', type: 'program', funder: 'trad', cls: 'card-trad', icon: '🎒' },
    { id: 'pt2', name: 'Building Repair', type: 'program', funder: 'trad', cls: 'card-trad', icon: '🏠' },

    // Crisis Cards (Must pay tokens to clear)
    { id: 'c1', name: 'Rent Hike', type: 'crisis', cost: 2, cls: 'card-crisis', icon: '🏢' },
    { id: 'c2', name: 'Staff Burnout', type: 'crisis', cost: 1, cls: 'card-crisis', icon: '🔥' },
    { id: 'c3', name: 'Audit Trap', type: 'crisis', cost: 2, cls: 'card-crisis', icon: '📁' },

    // The Golden Rare Card (Only 1 in the whole deck!)
    { id: 'js1', name: 'JOB SWITCH!', type: 'job-switch', cls: 'card-switch', icon: '🚀' }
];

let deck = [];
let hand = [];
let tokens = 3;
let selectedIds = [];

// Game state for Foundations
let oaksProgram = "Health Equity";
let tradProgram = "Backpack Drive";

// 2. INITIALIZE GAME
function initGame() {
    // Fill the deck with duplicates to make a real game pile (~30 cards)
    deck = [...DECK_TEMPLATE, ...DECK_TEMPLATE.slice(0, 10)]; 
    shuffle(deck);
    
    // Assign random starting programs to the automated foundations
    oaksProgram = Math.random() > 0.5 ? "Health Equity" : "Climate Justice";
    tradProgram = Math.random() > 0.5 ? "Backpack Drive" : "Building Repair";
    
    document.getElementById('oaks-status').innerHTML = `<strong>Oaks Foundation</strong> (Trust-Based)<br>Wants: 🌟 ${oaksProgram}`;
    document.getElementById('trad-status').innerHTML = `<strong>Traditional Funder</strong> (Rigid)<br>Wants: 📦 ${tradProgram}`;
    
    // Draw 5 starting cards
    for(let i=0; i<5; i++) drawCard();
    updateUI();
}

function shuffle(array) {
    array.sort(() => Math.random() - 0.5);
}

function drawCard() {
    if (deck.length > 0) {
        hand.push(deck.pop());
        updateUI();
    } else {
        alert("Deck is empty!");
    }
}

// 3. GAMEPLAY LOGIC
function playSelected() {
    let selectedCards = hand.filter(c => selectedIds.includes(c.id));
    
    // CHECK FOR JOB SWITCH (Instant Win/Boost!)
    let jobSwitch = selectedCards.find(c => c.type === 'job-switch');
    if (jobSwitch) {
        alert("🎉 CONGRATS! You landed a job at a foundation with a Million Dollar Budget! You get +5 tokens and clear all crises!");
        tokens += 5;
        // Automatically clear any crises currently in the player's hand
        hand = hand.filter(c => c.type !== 'crisis');
        discardPlayed(selectedCards);
        return;
    }

    // CHECK FOR CRISIS RESOLUTION
    let crises = selectedCards.filter(c => c.type === 'crisis');
    if (crises.length > 0 && selectedCards.length === 1) {
        let cost = crises[0].cost;
        if (tokens >= cost) {
            tokens -= cost;
            alert(`You paid ${cost} tokens to resolve ${crises[0].name}.`);
            discardPlayed(selectedCards);
        } else {
            alert("Not enough tokens to resolve this crisis!");
        }
        return;
    }

    // CHECK FOR GRANT SUBMISSION (1 Program + 3 Unique Actions)
    let programs = selectedCards.filter(c => c.type === 'program');
    let actions = selectedCards.filter(c => c.type === 'action');
    let uniqueActions = new Set(actions.map(a => a.name));

    if (programs.length === 1 && actions.length === 3) {
        if (uniqueActions.size !== 3) {
            alert("❌ Rejected! You cannot play duplicate action cards. Foundations want variety!");
            return;
        }

        let prog = programs[0];
        // Check alignment with automated foundations
        if (prog.funder === 'oaks' && prog.name === oaksProgram) {
            alert(`💸 SUCCESS! Oaks Foundation loved your proposal. Gain 3 tokens!`);
            tokens += 3;
            discardPlayed(selectedCards);
        } else if (prog.funder === 'trad' && prog.name === tradProgram) {
            alert(`💸 SUCCESS! Traditional Funder approved the line items. Gain 2 tokens!`);
            tokens += 2;
            discardPlayed(selectedCards);
        } else {
            alert("❌ Denied. That program does not match what the foundations are currently funding.");
        }
        return;
    }

    alert("Invalid move! Try playing 1 Crisis OR (1 Program + 3 Unique Actions).");
}

function discardPlayed(cards) {
    let idsToRemove = cards.map(c => c.id);
    hand = hand.filter(c => !idsToRemove.includes(c.id));
    selectedIds = [];
    updateUI();
}

function toggleSelect(id) {
    if (selectedIds.includes(id)) {
        selectedIds = selectedIds.filter(i => i !== id);
    } else {
        selectedIds.push(id);
    }
    updateUI();
}

// 4. UI RENDERER
function updateUI() {
    document.getElementById('token-count').innerText = tokens;
    let handDiv = document.getElementById('hand');
    handDiv.innerHTML = '';

    hand.forEach(card => {
        let cardDiv = document.createElement('div');
        cardDiv.className = `card ${card.cls} ${selectedIds.includes(card.id) ? 'selected' : ''}`;
        cardDiv.onclick = () => toggleSelect(card.id);
        
        let costText = card.type === 'crisis' ? `<br><b>Cost: ${card.cost} 🟡</b>` : '';
        cardDiv.innerHTML = `
            <h3>${card.icon}</h3>
            <h4>${card.name}</h4>
            <small>${card.type.toUpperCase()}</small>
            ${costText}
        `;
        handDiv.appendChild(cardDiv);
    });
}

// Run on load
initGame();
</script>

</body>
</html>
