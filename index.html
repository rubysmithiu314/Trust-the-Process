<script>
// ===============================
// 1. GAME DATA
// ===============================

const ACTION_POOL = [
    { name: 'Verbal Report', type: 'action', cls: 'card-action', icon: '🗣️' },
    { name: 'Site Visit', type: 'action', cls: 'card-action', icon: '👟' },
    { name: 'Policy Advocacy', type: 'action', cls: 'card-action', icon: '📢' },
    { name: 'Mutual Aid', type: 'action', cls: 'card-action', icon: '🤝' },
    { name: 'Storytelling', type: 'action', cls: 'card-action', icon: '📖' },
    { name: 'Coalition Meet', type: 'action', cls: 'card-action', icon: '👥' }
];

// 🌳 OAKS (realistic priorities)
const OAKS_PROGRAMS = [
    'Climate Change',
    'COVID Response',
    'Criminal Justice Reform'
];

// 🏛️ TRADITIONAL
const TRAD_PROGRAMS = [
    'Backpack Drive',
    'Building Repair',
    'After School Program'
];

const PROGRAM_POOL = [
    ...OAKS_PROGRAMS.map(p => ({ name: p, type: 'program', funder: 'oaks', cls: 'card-oaks', icon: '🌳' })),
    ...TRAD_PROGRAMS.map(p => ({ name: p, type: 'program', funder: 'trad', cls: 'card-trad', icon: '🏛️' }))
];

const CRISIS_POOL = [
    { name: 'Rent Hike', type: 'crisis', cost: 2, cls: 'card-crisis', icon: '🏢' },
    { name: 'Staff Burnout', type: 'crisis', cost: 1, cls: 'card-crisis', icon: '🔥' },
    { name: 'Emergency Audit', type: 'crisis', cost: 2, cls: 'card-crisis', icon: '📁' },
    { name: 'Scope Creep', type: 'crisis', cost: 1, cls: 'card-crisis', icon: '🐙' }
];

const RARE_CARD = { name: 'JOB SWITCH!', type: 'job-switch', cls: 'card-switch', icon: '🚀' };

let deck = [];
let hand = [];
let tokens = 3;
let selectedIds = [];
let turn = 1;

let oaksPrograms = [];
let tradPrograms = [];

let idCounter = 0;

// ===============================
// INIT
// ===============================

function initGame() {
    idCounter = 0;
    deck = [];

    for(let i=0; i<3; i++) ACTION_POOL.forEach(a => deck.push({...a, id: idCounter++}));
    for(let i=0; i<2; i++) PROGRAM_POOL.forEach(p => deck.push({...p, id: idCounter++}));
    for(let i=0; i<2; i++) CRISIS_POOL.forEach(c => deck.push({...c, id: idCounter++}));

    deck.push({...RARE_CARD, id: idCounter++});

    shuffle(deck);

    // Ensure different starting programs
    let oaksStart = OAKS_PROGRAMS[Math.floor(Math.random()*OAKS_PROGRAMS.length)];
    let tradStart;
    do {
        tradStart = TRAD_PROGRAMS[Math.floor(Math.random()*TRAD_PROGRAMS.length)];
    } while (tradStart === oaksStart);

    oaksPrograms = [oaksStart];
    tradPrograms = [tradStart];

    hand = [];
    for(let i=0;i<5;i++) hand.push(deck.pop());

    updateUI();
}

// ===============================
// TURN SYSTEM
// ===============================

function nextTurn() {
    turn++;

    // 🔥 AUTO PAY CRISES
    let totalCost = hand
        .filter(c => c.type === 'crisis')
        .reduce((sum,c)=>sum+c.cost,0);

    if (totalCost > 0) {
        if (tokens >= totalCost) {
            tokens -= totalCost;
            showMessage(`Paid ${totalCost} tokens for crises.`);
        } else {
            alert("💀 GAME OVER: You couldn't afford your crises.");
            initGame();
            return;
        }
    }

    // Draw
    if (deck.length > 0) hand.push(deck.pop());

    // 🌱 EXPAND FOUNDATIONS EVERY 7 TURNS
    if (turn % 7 === 0) {
        expandPrograms();
    }

    updateUI();
}

// ===============================
// FOUNDATION GROWTH
// ===============================

function expandPrograms() {
    if (oaksPrograms.length < 3) {
        let options = OAKS_PROGRAMS.filter(p => !oaksPrograms.includes(p));
        if (options.length) oaksPrograms.push(options[Math.floor(Math.random()*options.length)]);
    }

    if (tradPrograms.length < 3) {
        let options = TRAD_PROGRAMS.filter(p => !tradPrograms.includes(p));
        if (options.length) tradPrograms.push(options[Math.floor(Math.random()*options.length)]);
    }

    showMessage("📈 Foundations expanded their priorities!");
}

// ===============================
// GAMEPLAY
// ===============================

function playSelected() {
    let selectedCards = hand.filter(c => selectedIds.includes(c.id));

    let jobSwitch = selectedCards.find(c => c.type === 'job-switch');
    if (jobSwitch && selectedCards.length === 1) {
        tokens += 5;
        hand = hand.filter(c => c.type !== 'crisis');
        discardPlayed(selectedCards);
        nextTurn();
        return;
    }

    let programs = selectedCards.filter(c => c.type === 'program');
    let actions = selectedCards.filter(c => c.type === 'action');

    let uniqueActions = new Set(actions.map(a => a.name));

    if (programs.length === 1 && actions.length === 3 && uniqueActions.size === 3) {
        let prog = programs[0];

        if (prog.funder === 'oaks' && oaksPrograms.includes(prog.name)) {
            tokens += 3;
            showMessage("💸 Oaks funded you!");
            discardPlayed(selectedCards);
            nextTurn();
            return;
        }

        if (prog.funder === 'trad' && tradPrograms.includes(prog.name)) {
            tokens += 2;
            showMessage("💸 Traditional funder approved!");
            discardPlayed(selectedCards);
            nextTurn();
            return;
        }

        showMessage("❌ Not aligned with funders.");
        return;
    }

    showMessage("Invalid move.");
}

// ===============================
// HELPERS
// ===============================

function discardPlayed(cards) {
    let ids = cards.map(c=>c.id);
    hand = hand.filter(c=>!ids.includes(c.id));
    selectedIds = [];
    updateUI();
}

function toggleSelect(id) {
    if (selectedIds.includes(id)) {
        selectedIds = selectedIds.filter(i => i !== id);
    } else {
        selectedIds.push(id);
    }
    updateUI();
}

function showMessage(msg) {
    document.getElementById('game-message').innerText = msg;
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// ===============================
// UI
// ===============================

function updateUI() {
    document.getElementById('token-count').innerText = tokens;

    document.getElementById('oaks-status').innerHTML =
        `<strong>🌳 Oaks Foundation</strong><br>Programs:<br>${oaksPrograms.join("<br>")}`;

    document.getElementById('trad-status').innerHTML =
        `<strong>🏛️ Traditional Funder</strong><br>Programs:<br>${tradPrograms.join("<br>")}`;

    let handDiv = document.getElementById('hand');
    handDiv.innerHTML = '';

    hand.forEach(card => {
        let div = document.createElement('div');
        div.className = `card ${card.cls} ${selectedIds.includes(card.id) ? 'selected' : ''}`;
        div.onclick = () => toggleSelect(card.id);

        let sub = "";
        if (card.type === 'crisis') sub = `<br>Cost: ${card.cost}`;

        div.innerHTML = `
            <h3>${card.icon}</h3>
            <h4>${card.name}</h4>
            <small>${card.type}</small>
            ${sub}
        `;

        handDiv.appendChild(div);
    });
}

// ===============================
initGame();
</script>
