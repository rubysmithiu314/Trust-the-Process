<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust The Process | Final Simulation</title>
    <style>
        :root { --bg: #F3E8E3; --dark: #2F2E41; --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D; --white: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', sans-serif; }
        body { background-color: var(--bg); color: var(--dark); padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--white); border: 4px solid var(--dark); box-shadow: 8px 8px 0px var(--dark); border-radius: 15px; overflow: hidden; }
        .header { background: var(--accent); padding: 15px; text-align: center; border-bottom: 4px solid var(--dark); font-weight: 900; text-transform: uppercase; font-size: 1.2rem; }
        .status-bar { background: var(--dark); color: white; padding: 8px 15px; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .tabs { display: flex; border-bottom: 4px solid var(--dark); background: #eee; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: bold; border-right: 2px solid var(--dark); }
        .tab.active { background: var(--white); border-bottom: none; }
        .content { padding: 15px; display: none; min-height: 400px; }
        .content.active { display: block; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .card { border: 3px solid var(--dark); padding: 8px; border-radius: 8px; text-align: center; font-size: 0.7rem; font-weight: bold; min-height: 90px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; background: white; box-shadow: 3px 3px 0px var(--dark); }
        .card.selected { background: var(--secondary) !important; color: white; transform: translateY(-2px); }
        .card.program { background: #FFD166; }
        .card.action { background: #06D6A0; }
        .card.funding-unres { background: #8338EC; color: white; border-style: dashed; }
        .card.crisis { background: #EF476F; color: white; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: 3px solid var(--dark); font-weight: 900; border-radius: 8px; cursor: pointer; box-shadow: 4px 4px 0px var(--dark); text-transform: uppercase; }
        .btn:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0px var(--dark); }
        .btn-main { background: var(--secondary); }
        .info-box { border: 3px solid var(--dark); background: #fdfdfd; padding: 10px; margin-bottom: 10px; font-size: 0.8rem; border-radius: 8px; line-height: 1.4; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border: 4px solid var(--dark); width: 90%; max-width: 400px; border-radius: 15px; }
    </style>
</head>
<body>
