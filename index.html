<script>
// ===============================
// SAFE GAME VERSION
// ===============================

const ACTION_POOL = [
    { name: 'Verbal Report', type: 'action', cls: 'card-action', icon: '🗣️' },
    { name: 'Site Visit', type: 'action', cls: 'card-action', icon: '👟' },
    { name: 'Policy Advocacy', type: 'action', cls: 'card-action', icon: '📢' },
    { name: 'Mutual Aid', type: 'action', cls: 'card-action', icon: '🤝' },
    { name: 'Storytelling', type: 'action', cls: 'card-action', icon: '📖' },
    { name: 'Coalition Meet', type: 'action', cls: 'card-action', icon: '👥' }
];

const OAKS_PROGRAMS = [
    'Climate Change',
    'COVID Response',
    'Criminal Justice Reform'
];

const TRAD_PROGRAMS = [
    'Backpack Drive',
    'Building Repair',
    'After School Program'
];

const CRISIS_POOL = [
    { name: 'Rent Hike', type: 'crisis', cost: 2, cls: 'card-crisis', icon: '🏢' },
    { name: 'Staff Burnout', type: 'crisis', cost: 1, cls: 'card-crisis', icon: '🔥' },
    { name: 'Emergency Audit', type: 'crisis', cost: 2, cls: 'card-crisis', icon: '📁' },
    { name: 'Scope Creep', type: 'crisis', cost: 1, cls: 'card-crisis', icon: '🐙' }
];

const RARE_CARD = { name: 'JOB SWITCH!', type: 'job-switch', cls: 'card-switch', icon: '🚀' };

let deck = [];
let hand = [];
let tokens = 3;
let selectedIds = [];
let turn = 1;

let oaksPrograms = [];
let tradPrograms = [];

let idCounter = 0;

// ===============================
// INIT
// ===============================

function initGame() {
    try {
        idCounter = 0;
        deck = [];

        for(let i=0; i<3; i++) ACTION_POOL.forEach(a => deck.push({...a, id: idCounter++}));
        for(let i=0; i<2; i++) {
            OAKS_PROGRAMS.forEach(p => deck.push({ name:p, type:'program', funder:'oaks', cls:'card-oaks', icon:'🌳', id:idCounter++ }));
            TRAD_PROGRAMS.forEach(p => deck.push({ name:p, type:'program', funder:'trad', cls:'card-trad', icon:'🏛️', id:idCounter++ }));
        }
        for(let i=0; i<2; i++) CRISIS_POOL.forEach(c => deck.push({...c, id: idCounter++}));

        deck.push({...RARE_CARD, id: idCounter++});

        shuffle(deck);

        // different starts
        oaksPrograms = [OAKS_PROGRAMS[Math.floor(Math.random()*OAKS_PROGRAMS.length)]];
        tradPrograms = [TRAD_PROGRAMS[Math.floor(Math.random()*TRAD_PROGRAMS.length)]];

        hand = [];
        for(let i=0;i<5;i++) if(deck.length) hand.push(deck.pop());

        updateUI();
        showMessage("Game started.");
    } catch (e) {
        console.error(e);
        alert("Error initializing game");
    }
}

// ===============================
// TURN
// ===============================

function nextTurn() {
    try {
        turn++;

        // PAY CRISES
        let crises = hand.filter(c => c.type === 'crisis');
        let totalCost = crises.reduce((sum,c)=>sum+c.cost,0);

        if (totalCost > 0) {
            if (tokens >= totalCost) {
                tokens -= totalCost;
                showMessage(`Paid ${totalCost} tokens for crises.`);
            } else {
                alert("GAME OVER: Couldn't afford crises.");
                initGame();
                return;
            }
        }

        if (deck.length) hand.push(deck.pop());

        if (turn % 7 === 0) expandPrograms();

        updateUI();
    } catch (e) {
        console.error(e);
        alert("Turn error");
    }
}

// ===============================
// EXPAND
// ===============================

function expandPrograms() {
    if (oaksPrograms.length < 3) {
        let options = OAKS_PROGRAMS.filter(p => !oaksPrograms.includes(p));
        if (options.length) oaksPrograms.push(options[Math.floor(Math.random()*options.length)]);
    }

    if (tradPrograms.length < 3) {
        let options = TRAD_PROGRAMS.filter(p => !tradPrograms.includes(p));
        if (options.length) tradPrograms.push(options[Math.floor(Math.random()*options.length)]);
    }

    showMessage("Foundations expanded!");
}

// ===============================
// PLAY
// ===============================

function playSelected() {
    try {
        let selected = hand.filter(c => selectedIds.includes(c.id));

        if (!selected.length) {
            showMessage("Select cards.");
            return;
        }

        let job = selected.find(c=>c.type==='job-switch');
        if (job && selected.length === 1) {
            tokens += 5;
            hand = hand.filter(c=>c.type!=='crisis');
            discard(selected);
            nextTurn();
            return;
        }

        let prog = selected.filter(c=>c.type==='program');
        let act = selected.filter(c=>c.type==='action');

        let unique = new Set(act.map(a=>a.name));

        if (prog.length===1 && act.length===3 && unique.size===3) {
            let p = prog[0];

            if (p.funder==='oaks' && oaksPrograms.includes(p.name)) {
                tokens+=3;
                showMessage("Oaks funded!");
                discard(selected);
                nextTurn();
                return;
            }

            if (p.funder==='trad' && tradPrograms.includes(p.name)) {
                tokens+=2;
                showMessage("Traditional funded!");
                discard(selected);
                nextTurn();
                return;
            }

            showMessage("Not aligned.");
            return;
        }

        showMessage("Invalid play.");
    } catch (e) {
        console.error(e);
        alert("Play error");
    }
}

// ===============================
// HELPERS
// ===============================

function discard(cards) {
    let ids = cards.map(c=>c.id);
    hand = hand.filter(c=>!ids.includes(c.id));
    selectedIds = [];
    updateUI();
}

function toggleSelect(id) {
    if (selectedIds.includes(id)) {
        selectedIds = selectedIds.filter(i=>i!==id);
    } else {
        selectedIds.push(id);
    }
    updateUI();
}

function showMessage(msg) {
    let el = document.getElementById('game-message');
    if (el) el.innerText = msg;
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

// ===============================
// UI
// ===============================

function updateUI() {
    document.getElementById('token-count').innerText = tokens;

    document.getElementById('oaks-status').innerHTML =
        `<strong>🌳 Oaks</strong><br>${oaksPrograms.join("<br>")}`;

    document.getElementById('trad-status').innerHTML =
        `<strong>🏛️ Traditional</strong><br>${tradPrograms.join("<br>")}`;

    let handDiv = document.getElementById('hand');
    if (!handDiv) return;

    handDiv.innerHTML = '';

    hand.forEach(card => {
        let d = document.createElement('div');
        d.className = `card ${card.cls} ${selectedIds.includes(card.id) ? 'selected' : ''}`;
        d.onclick = () => toggleSelect(card.id);

        d.innerHTML = `
            <h3>${card.icon}</h3>
            <h4>${card.name}</h4>
            <small>${card.type}</small>
        `;

        handDiv.appendChild(d);
    });
}

// ===============================
initGame();
</script>
