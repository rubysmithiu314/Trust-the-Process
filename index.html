<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trust the Process</title>

<style>
body{
  background:#0a0a0a;
  color:#f5f0e8;
  font-family:monospace;
  text-align:center;
  margin:0;
}

h1{color:#f4dc26}

#stats{
  margin:10px;
  font-size:18px;
}

#hand{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  padding:10px;
}

.card{
  width:90px;
  border:3px solid white;
  padding:8px;
  cursor:pointer;
  background:#222;
}

.selected{
  background:#f4dc26;
  color:black;
}

button{
  padding:10px 16px;
  margin:6px;
  font-size:16px;
  cursor:pointer;
}

#message{
  margin-top:12px;
  height:24px;
}
</style>
</head>

<body>

<h1>TRUST THE PROCESS</h1>

<div id="stats">
Turn: <span id="turn">1</span> |
Tokens: <span id="tokens">3</span>
</div>

<div id="hand"></div>

<button onclick="playSelected()">Play Cards</button>
<button onclick="nextTurn()">Next Turn</button>

<div id="message"></div>

<script>
/* =========================
   SOUND SYSTEM (NO DOWNLOADS)
========================= */

const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

document.addEventListener("click",()=>{
 if(audioCtx.state==="suspended") audioCtx.resume();
},{once:true});

function beep(freq,dur){
 const o=audioCtx.createOscillator();
 const g=audioCtx.createGain();
 o.frequency.value=freq;
 o.connect(g);
 g.connect(audioCtx.destination);
 o.start();
 g.gain.setValueAtTime(.2,audioCtx.currentTime);
 g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
 o.stop(audioCtx.currentTime+dur);
}

function sound(type){
 if(type==="draw") beep(600,.08);
 if(type==="play") beep(350,.12);
 if(type==="win"){beep(700,.15);setTimeout(()=>beep(900,.2),150);}
 if(type==="lose") beep(120,.6);
 if(type==="crisis") beep(200,.2);
}

/* =========================
   GAME DATA
========================= */

const ACTIONS=["Report","Visit","Advocate","Aid","Story","Meet"];
const PROGRAMS=["Climate","COVID","Justice"];

let deck=[];
let hand=[];
let selected=[];
let tokens=3;
let turn=1;

const MAX_HAND=7;
const WIN_TOKENS=15;
const MAX_TURNS=20;

/* =========================
   INIT
========================= */

function initGame(){

deck=[];
hand=[];
selected=[];
tokens=3;
turn=1;

// build deck
for(let i=0;i<3;i++)
  ACTIONS.forEach(a=>deck.push({type:"action",name:a}));

for(let i=0;i<3;i++)
  PROGRAMS.forEach(p=>deck.push({type:"program",name:p}));

for(let i=0;i<6;i++)
  deck.push({type:"crisis",name:"Crisis",cost:1});

shuffle(deck);

// starting hand
for(let i=0;i<5;i++) draw();

updateUI();
message("Game started.");
}

/* =========================
   CORE LOOP
========================= */

function nextTurn(){

turn++;
message("Turn "+turn);

resolveCrises();

draw();

if(hand.length>MAX_HAND){
 hand.shift();
 message("Too many tasks — lost oldest card.");
}

updateUI();

checkEnd();
}

function resolveCrises(){
let cost=hand
 .filter(c=>c.type==="crisis")
 .reduce((s,c)=>s+c.cost,0);

if(cost>0){
 sound("crisis");

 if(tokens>=cost){
   tokens-=cost;
   message("Paid "+cost+" tokens.");
 }else{
   endGame(false);
 }
}
}

/* =========================
   PLAY CARDS
========================= */

function playSelected(){

if(selected.length===0){
 message("Select cards.");
 return;
}

const cards=selected.map(i=>hand[i]);

const actions=cards.filter(c=>c.type==="action");
const programs=cards.filter(c=>c.type==="program");

const unique=new Set(actions.map(a=>a.name));

if(programs.length===1 && unique.size===3){
 tokens+=3;
 sound("play");
 message("Program funded!");
 removeSelected();
 nextTurn();
 return;
}

message("Invalid combo.");
}

/* =========================
   DRAW + REMOVE
========================= */

function draw(){
 if(deck.length===0) return;
 hand.push(deck.pop());
 sound("draw");
}

function removeSelected(){
 hand=hand.filter((_,i)=>!selected.includes(i));
 selected=[];
}

/* =========================
   END GAME
========================= */

function checkEnd(){
 if(tokens>=WIN_TOKENS) endGame(true);
 if(turn>MAX_TURNS) endGame(false);
}

function endGame(win){
 if(win){
   sound("win");
   alert("YOU BUILT COMMUNITY POWER!");
 }else{
   sound("lose");
   alert("Burnout overtook the organization.");
 }
 initGame();
}

/* =========================
   UI
========================= */

function updateUI(){

document.getElementById("turn").textContent=turn;
document.getElementById("tokens").textContent=tokens;

const handDiv=document.getElementById("hand");
handDiv.innerHTML="";

hand.forEach((card,i)=>{
 const d=document.createElement("div");
 d.className="card"+(selected.includes(i)?" selected":"");
 d.innerHTML=
 `<strong>${card.name}</strong><br><small>${card.type}</small>`;
 d.onclick=()=>toggle(i);
 handDiv.appendChild(d);
});
}

function toggle(i){
 if(selected.includes(i))
   selected=selected.filter(x=>x!==i);
 else
   selected.push(i);

updateUI();
}

function message(m){
 document.getElementById("message").textContent=m;
}

function shuffle(a){
 for(let i=a.length-1;i>0;i--){
   const j=Math.floor(Math.random()*(i+1));
   [a[i],a[j]]=[a[j],a[i]];
 }
}

/* ========================= */

window.onload=initGame;

</script>
</body>
</html>
